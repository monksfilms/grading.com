<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>grading.com — Biblioteca de Color Grading Cinematográfico</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;450;500&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

<template id="__bundler_thumbnail">
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" fill="#0a0a0a"/>
  <rect x="36" y="36" width="48" height="48" rx="6" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3aa8c7"/>
      <stop offset="1" stop-color="#e88a4a"/>
    </linearGradient>
  </defs>
</svg>
</template>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="studio.jsx"></script>
<script type="text/babel" src="color-tools.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "density": "comfy",
  "animations": true,
  "typePair": "inter-tight"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks to :root
  React.useEffect(() => {
    const r = document.documentElement;
    if (t.accent === "orange") r.style.setProperty("--accent", "oklch(0.74 0.14 50)");
    else if (t.accent === "teal") r.style.setProperty("--accent", "oklch(0.74 0.11 200)");
    else if (t.accent === "crimson") r.style.setProperty("--accent", "oklch(0.68 0.16 18)");
    else if (t.accent === "lime") r.style.setProperty("--accent", "oklch(0.82 0.14 128)");

    if (t.typePair === "inter-tight") {
      r.style.setProperty("--display", "'Inter Tight', sans-serif");
      r.style.setProperty("--text", "'Inter', sans-serif");
    } else if (t.typePair === "serif") {
      r.style.setProperty("--display", "'Instrument Serif', Georgia, serif");
      r.style.setProperty("--text", "'Inter', sans-serif");
    } else if (t.typePair === "mono") {
      r.style.setProperty("--display", "'JetBrains Mono', monospace");
      r.style.setProperty("--text", "'Inter', sans-serif");
    }

    document.body.classList.toggle("no-motion", !t.animations);
  }, [t.accent, t.typePair, t.animations]);

  return (
    <>
      <Nav />
      <main>
        <Hero />
        <What />
        <Luts density={t.density} />
        <Studio />
        <Compat />
        <Cta />
      </main>
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Paleta" />
        <TweakRadio
          label="Accent"
          value={t.accent}
          options={["orange", "teal", "crimson", "lime"]}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakSection label="Tipografia" />
        <TweakRadio
          label="Par"
          value={t.typePair}
          options={["inter-tight", "serif", "mono"]}
          onChange={(v) => setTweak("typePair", v)}
        />
        <TweakSection label="Grade" />
        <TweakRadio
          label="Densidade"
          value={t.density}
          options={["compact", "regular", "comfy"]}
          onChange={(v) => setTweak("density", v)}
        />
        <TweakSection label="Movimento" />
        <TweakToggle
          label="Animações de scroll"
          value={t.animations}
          onChange={(v) => setTweak("animations", v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
